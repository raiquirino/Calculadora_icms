<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="style.css"> <!-- CSS separado -->
<link rel="stylesheet" href="style_calculadora.css"> <!-- CSS separado -->
<title>Calculadora de Impostos - ICMS ST</title>

</head>
<body>

<header>
  <nav>
    <h1>Calculadora de Impostos</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="servicos.html">Serviços</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>
</header>

<div class="container">

  <aside class="sidebar">
    <ul>
      <li><a href="icms_difal.html">ICMS DIFAL</a></li>
      <li><a href="icms_antecipado.html">ICMS Antecipado</a></li>
      <li><a href="#">Imposto 3</a></li>
      <li><a href="#">Imposto 4</a></li>
      <li><a href="#">Imposto 5</a></li>
    </ul>
  </aside>

  <main class="content">
    <div class="card">
      <h2>Calculadora ICMS Antecipado</h2>

      <form id="icmsForm" onsubmit="return false;">
        <div class="campo">
          <label for="emissao">Emissão:</label>
          <input type="date" id="emissao" />
        </div>

        <div class="campo">
          <label for="valorProduto">Valor do Produto (R$):</label>
          <input type="number" id="valorProduto" step="0.01" />
        </div>

        <div class="campo">
          <label for="frete">Frete (R$):</label>
          <input type="number" id="frete" step="0.01" />
        </div>

        <div class="campo">
          <label for="ipi">IPI (R$):</label>
          <input type="number" id="ipi" step="0.01" />
        </div>

        <div class="campo">
          <label for="outrasDespesas">Outras Despesas (R$):</label>
          <input type="number" id="outrasDespesas" step="0.01" />
        </div>

        <div class="campo">
          <label for="descontos">Descontos (R$):</label>
          <input type="number" id="descontos" step="0.01" />
        </div>

        <div class="campo">
          <label for="mva">MVA (%):</label>
          <input type="number" id="mva" step="0.01" />
        </div>

        <div class="campo">
          <label for="reducaoBase">Redução da Base de Cálculo (%):</label>
          <input type="number" id="reducaoBase" step="0.01" />
        </div>

        <div class="campo">
          <label for="aliquotaInterna">Alíquota Interna (%):</label>
          <input type="number" id="aliquotaInterna" step="0.01" />
        </div>

        <div class="campo">
          <label for="aliquotaInterestadual">Alíquota Interestadual (%):</label>
          <input type="number" id="aliquotaInterestadual" step="0.01" />
        </div>

        <div class="campo">
          <label for="reducaoOrigem">Redução ICMS Origem (%):</label>
          <input type="number" id="reducaoOrigem" step="0.01" />
        </div>

        <button type="button" onclick="calcular()">Calcular</button>
      </form>

      <div class="resultado" id="resultado"></div>
      <div class="explicacao" id="explicacao"></div>
    </div>
  </main>

</div>

<script>
function calcular() {
  const valorProduto = parseFloat(document.getElementById('valorProduto').value) || 0;
  const frete = parseFloat(document.getElementById('frete').value) || 0;
  const ipi = parseFloat(document.getElementById('ipi').value) || 0;
  const outrasDespesas = parseFloat(document.getElementById('outrasDespesas').value) || 0;
  const descontos = parseFloat(document.getElementById('descontos').value) || 0;
  const mva = parseFloat(document.getElementById('mva').value) || 0;
  const reducaoBase = parseFloat(document.getElementById('reducaoBase').value) || 0;
  const aliquotaInterna = parseFloat(document.getElementById('aliquotaInterna').value) || 0;
  const aliquotaInterestadual = parseFloat(document.getElementById('aliquotaInterestadual').value) || 0;
  const reducaoOrigem = parseFloat(document.getElementById('reducaoOrigem').value) || 0;

  const emissaoInput = document.getElementById('emissao').value;
  let vencimentoStr = 'Não informado';
  if (emissaoInput) {
    const emissao = new Date(emissaoInput);
    const vencimento = new Date(emissao);
    vencimento.setDate(vencimento.getDate() + 20);
    vencimentoStr = vencimento.toLocaleDateString('pt-BR');
  }

  const valorOperacao = valorProduto + frete + ipi + outrasDespesas - descontos;
  const valorMVA = valorOperacao * (1 + mva / 100);
  const baseCalculoAnt = valorMVA * (reducaoBase / 100);
  const icmsAntecipadoInterno = baseCalculoAnt * (aliquotaInterna / 100);
  const bcICMS = valorOperacao * ((100 - reducaoOrigem) / 100);
  const icmsOrigem = bcICMS * (aliquotaInterestadual / 100);
  const icmsAntecipadoOrigem = icmsOrigem * (reducaoBase / 100);
  const icmsAPagar = icmsAntecipadoInterno - icmsAntecipadoOrigem;

 document.getElementById('resultado').innerHTML = `<strong>ICMS a Pagar:</strong> R$ ${icmsAPagar.toFixed(2)}`;

  const explicacaoHTML = `
    <h2>Explicação dos Cálculos</h2>
    <p><strong>Valor da Operação</strong> = Produto + Frete + IPI + Outras Despesas - Descontos</p>
    <p>(${valorProduto.toFixed(2)} + ${frete.toFixed(2)} + ${ipi.toFixed(2)} + ${outrasDespesas.toFixed(2)} - ${descontos.toFixed(2)}) = <span class="resultado">R$ ${valorOperacao.toFixed(2)}</span></p>
    <p><strong>Valor do MVA</strong> = Valor da Operação × (1 + MVA%)</p>
    <p>${valorOperacao.toFixed(2)} × (1 + ${mva.toFixed(2)}%) = <span class="resultado">R$ ${valorMVA.toFixed(2)}</span></p>
    <p><strong>Base de Cálculo da Antecipação</strong> = Valor do MVA × Redução da Base%</p>
    <p>${valorMVA.toFixed(2)} × ${reducaoBase.toFixed(2)}% = <span class="resultado">R$ ${baseCalculoAnt.toFixed(2)}</span></p>
    <p><strong>ICMS Antecipado Interno</strong> = Base de Cálculo da Antecipação × Alíquota Interna%</p>
    <p>${baseCalculoAnt.toFixed(2)} × ${aliquotaInterna.toFixed(2)}% = <span class="resultado">R$ ${icmsAntecipadoInterno.toFixed(2)}</span></p>
    <p><strong>Base de Cálculo do ICMS</strong> = Valor da Operação × (100% - Redução ICMS Origem%)</p>
    <p>${valorOperacao.toFixed(2)} × (100 - ${reducaoOrigem.toFixed(2)}%) = <span class="resultado">R$ ${bcICMS.toFixed(2)}</span></p>
    <p><strong>ICMS Origem</strong> = Base de Cálculo × Alíquota Interestadual%</p>
    <p>${bcICMS.toFixed(2)} × ${aliquotaInterestadual.toFixed(2)}% = <span class="resultado">R$ ${icmsOrigem.toFixed(2)}</span></p>
    <p><strong>ICMS Antecipado Origem</strong> = ICMS Origem × Redução da Base%</p>
    <p>${icmsOrigem.toFixed(2)} × ${reducaoBase.toFixed(2)}% = <span class="resultado">R$ ${icmsAntecipadoOrigem.toFixed(2)}</span></p>
    <p><strong>ICMS a Pagar</strong> = ICMS Antecipado Interno - ICMS Antecipado Origem</p>
    <p>${icmsAntecipadoInterno.toFixed(2)} - ${icmsAntecipadoOrigem.toFixed(2)} = <span class="resultado">R$ ${icmsAPagar.toFixed(2)}</span></p>
    <p><strong>Vencimento (20 dias corridos a partir do dia seguinte da emissão)</strong>: <span class="vencimento">${vencimentoStr}</span></p>
  `;

  document.getElementById('explicacao').innerHTML = explicacaoHTML;
}
</script>

</body>
</html>
